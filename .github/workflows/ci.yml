name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API · lint, typecheck, tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check app tests

      - name: Ruff — format check
        run: ruff format --check app tests

      - name: Pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
          INGESTION_USE_FIXTURES: "true"
          PYTHONHASHSEED: "0"
        run: pytest -q --maxfail=1

      - name: Fixture regeneration is byte-stable
        # Running the generator must produce the exact same JSON that ships
        # in data-demo/ — this guards the fixture snapshot from drifting.
        run: |
          cd ../..
          python scripts/generate_fixtures.py
          git diff --exit-code data-demo

  web:
    name: Web · lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Next build
        run: npm run build
